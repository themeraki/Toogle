name: Build Hotspot Automator APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
    
    - name: Initialize Java Development Environment 
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Rights to Local Wrapper
      run: chmod +x gradlew

    - name: Build Application Package with Gradle Compilation Target
      run: ./gradlew assembleDebug

    - name: Export Ready APK Binary Deliverable
      uses: actions/upload-artifact@v4
      with:
        name: HotspotAutomator-DebugPackage
        path: app/build/outputs/apk/debug/app-debug.apk
