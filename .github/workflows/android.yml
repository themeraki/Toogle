name: Build Hotspot Automator APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4
    
    - name: Initialize Java Development Environment 
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup and Install Gradle Automatically
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build Application Package
      run: gradle assembleDebug

    - name: Export Ready APK Binary Deliverable
      uses: actions/upload-artifact@v4
      with:
        name: HotspotAutomator-DebugPackage
        path: app/build/outputs/apk/debug/app-debug.apk
